name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: tempconverter
          MYSQL_USER: tempuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: tempconverter
      DB_USER: tempuser
      DB_PASS: testpass
      STUDENT: Bojan
      COLLEGE: Algebra Bernays University

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/test_unit.py -v

      - name: Start the application
        run: |
          python app.py &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ >/dev/null; then
              echo "Application is up"
              break
            fi
            echo "Waiting for the application..."
            sleep 2
          done

      - name: Run integration tests
        env:
          APP_URL: http://localhost:5000
        run: python -m pytest tests/test_integration.py -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t tempconverter:ci .
